version: 1
name: Advance Agent
description: Agent Advanced
appVersion: 1.0.0
icon: app-icon.svg
image: ghcr.io/arensc/advance-agent:{{appVersion}}
services:
  - port: 3000
    path: /
    restartOnFailure: false
persistentPaths: []
fields:
  - type: model
    key: featherlessModel
    label: Featherless Model
    description: Default model ID for the app.
    required: true
    advanced: false
    default: zai-org/GLM-5.1
  - type: password
    key: featherlessApiKey
    label: Featherless API Key
    description: featherless.ai → Account Settings → API Keys
    required: true
    advanced: false
    placeholder: rc_...
    generated: false
  - type: text
    key: featherlessApiBaseUrl
    label: Featherless API Base URL
    required: false
    advanced: true
    default: https://api.featherless.ai/v1
    generated: false
envTemplate:
  FEATHERLESS_MODEL: "{{featherlessModel}}"
  FEATHERLESS_API_KEY: "{{featherlessApiKey}}"
  FEATHERLESS_API_BASE_URL: "{{featherlessApiBaseUrl}}"
seedFileTemplates: []

# --------------------------------------------------------------------------
# Internal-app CI. Mirrors agent-apps/feather-agent/.gitlab-ci.yml.
# Builds an image on every `vX.Y.Z` tag and pushes to Docker Hub.
# --------------------------------------------------------------------------

stages:
  - build
  - publish

variables:
  IMAGE_NAME: featherlessai/advance-agent
  INTERNAL_REGISTRY: gitlab-server.gitlab.svc.cluster.local:5050

.docker-build:
  stage: build
  image: docker:24
  timeout: 45 minutes
  tags:
    - sd-sfo3-sysops-01
  services:
    - name: docker:24-dind
      command: ["--tls=false", "--insecure-registry=gitlab-server.gitlab.svc.cluster.local:5050"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    - echo -n $DOCKERHUB_ACCESS_TOKEN | docker login -u "$DOCKERHUB_USER" --password-stdin $DOCKERHUB_REGISTRY
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $INTERNAL_REGISTRY
    - |
      cat > /tmp/buildkitd.toml <<'TOML'
      [registry."gitlab-server.gitlab.svc.cluster.local:5050"]
        http = true
        insecure = true
      TOML
    - |
      docker buildx create --use \
        --config /tmp/buildkitd.toml \
        --driver-opt "network=host"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

build:
  extends: .docker-build
  script:
    - |
      docker buildx build \
        --pull \
        --push \
        --cache-from type=registry,ref=$INTERNAL_REGISTRY/$CI_PROJECT_PATH:cache \
        --cache-to type=registry,ref=$INTERNAL_REGISTRY/$CI_PROJECT_PATH:cache,mode=max \
        -t $IMAGE_NAME:$CI_COMMIT_SHA \
        .

publish:latest:
  extends: .docker-build
  stage: publish
  needs: [build]
  script:
    - |
      docker buildx imagetools create \
        $IMAGE_NAME:$CI_COMMIT_SHA \
        --tag $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

publish:release:
  extends: .docker-build
  stage: publish
  needs: [build]
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      docker buildx imagetools create \
        $IMAGE_NAME:$CI_COMMIT_SHA \
        --tag $IMAGE_NAME:$VERSION
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
